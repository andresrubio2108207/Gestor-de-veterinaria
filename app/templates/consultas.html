<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas</title>
    <link rel="icon" type="image/png" href="https://images.vexels.com/media/users/3/144928/isolated/preview/ebbccaf76f41f7d83e45a42974cfcd87-ilustracion-de-perro.png">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/consultas.css') }}">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <div class="logo">PetCare<span>.</span></div>
            <nav class="nav">
                <a href="{{ url_for('home') }}">Inicio</a>
                <a href="{{ url_for('mascotas') }}">Mascotas</a>
                <a href="{{ url_for('consultas') }}">Consultas</a>
                <a href="{{ url_for('historial') }}">Historial</a>
                <a href="{{ url_for('veterinarios') }}">Veterinarios</a>
                <a href="{{ url_for('login') }}" class="btn-login">Ingresar</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section class="consulta container">
            <h2>Solicitar Consulta para tu Mascota</h2>
            <form class="form-consulta">
                <label for="nombre">Tu Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre del dueño" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

                <label for="mascota">Nombre de la Mascota:</label>
                <input type="text" id="mascota" name="mascota" placeholder="Nombre de tu mascota" required>

                <label for="tipo">Tipo de Consulta:</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecciona una opción</option>
                    <option value="salud">Salud</option>
                    <option value="alimentacion">Alimentación</option>
                    <option value="adiestramiento">Adiestramiento</option>
                    <option value="otros">Otros</option>
                </select>

                <label for="mensaje">Descripción del Problema / Consulta:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Describe lo que necesitas..." required></textarea>

                <button type="submit" class="btn-primary">Enviar Consulta</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p class="copyright">
            <strong>© 2026 Clínica Veterinaria PetCare. Todos los derechos reservados.</strong>
        </p>
    </footer>
</body>
</html>

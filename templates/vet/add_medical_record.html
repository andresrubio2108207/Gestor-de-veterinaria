{% extends 'base.html' %}
{% block title %}PetCare - Registro Médico{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-1">
                    <i class="bi bi-file-medical-fill me-2 text-success"></i>
                    {{ 'Editar' if record else 'Añadir' }} Registro Médico
                </h3>
                <p class="text-muted mb-4">
                    Consulta #{{ consultation.id }} —
                    <strong>{{ consultation.pet.name }}</strong>
                    ({{ consultation.date.strftime('%d/%m/%Y') }})
                </p>
                <form method="POST"
                      action="{{ url_for('main.add_medical_record', consultation_id=consultation.id) }}"
                      novalidate>
                    <div class="mb-3">
                        <label for="diagnosis" class="form-label fw-semibold">Diagnóstico</label>
                        <textarea class="form-control" id="diagnosis" name="diagnosis" rows="3"
                                  placeholder="Diagnóstico del paciente...">{{ record.diagnosis if record and record.diagnosis else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="treatment" class="form-label fw-semibold">Tratamiento</label>
                        <textarea class="form-control" id="treatment" name="treatment" rows="3"
                                  placeholder="Tratamiento recomendado...">{{ record.treatment if record and record.treatment else '' }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label for="observations" class="form-label fw-semibold">Observaciones</label>
                        <textarea class="form-control" id="observations" name="observations" rows="3"
                                  placeholder="Observaciones adicionales...">{{ record.observations if record and record.observations else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-1"></i>Guardar
                        </button>
                        <a href="{{ url_for('main.consultation_detail', consultation_id=consultation.id) }}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

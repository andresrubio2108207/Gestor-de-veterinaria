{% extends 'base.html' %}
{% block title %}PetCare - Añadir Mascota{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">
                    <i class="bi bi-plus-circle-fill me-2 text-primary"></i>Añadir Mascota
                </h3>
                <form method="POST" action="{{ url_for('main.add_pet') }}" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               placeholder="Nombre de la mascota" required>
                    </div>
                    <div class="mb-3">
                        <label for="species" class="form-label fw-semibold">Especie <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="species" name="species"
                               placeholder="Ej: Perro, Gato, Conejo..." required>
                    </div>
                    <div class="mb-3">
                        <label for="breed" class="form-label fw-semibold">Raza</label>
                        <input type="text" class="form-control" id="breed" name="breed"
                               placeholder="Raza (opcional)">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="age" class="form-label fw-semibold">Edad (años)</label>
                            <input type="number" class="form-control" id="age" name="age"
                                   placeholder="Edad" min="0" max="100">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="weight" class="form-label fw-semibold">Peso (kg)</label>
                            <input type="number" step="0.01" class="form-control" id="weight" name="weight"
                                   placeholder="Peso en kg" min="0">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Guardar
                        </button>
                        <a href="{{ url_for('main.owner_dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

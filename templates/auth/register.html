{% extends 'base.html' %}
{% block title %}PetCare - Registrarse{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h3 class="card-title mb-4 text-center">
                    <i class="bi bi-person-plus-fill me-2 text-primary"></i>Crear Cuenta
                </h3>
                <form method="POST" action="{{ url_for('main.register') }}" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Nombre de usuario" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label fw-semibold">Confirmar contraseña</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               placeholder="Repite la contraseña" required>
                    </div>
                    <div class="mb-4">
                        <label for="role" class="form-label fw-semibold">Rol</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="" disabled selected>Selecciona tu rol</option>
                            <option value="owner">Dueño de mascota</option>
                            <option value="vet">Veterinario</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-check-fill me-2"></i>Registrarse
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">
                    ¿Ya tienes cuenta?
                    <a href="{{ url_for('main.login') }}">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
